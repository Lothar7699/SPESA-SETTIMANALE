<div id="root"></div>
<script type="text/babel">

const {useState,useEffect,useMemo,useRef,useCallback}=React;

/* ================================================================
   SUPABASE — configurazione
   La anon key è la chiave pubblica (client-side safe).
   RLS controlla i permessi lato server.
   ================================================================ */
const SB   = 'https://fvuwwxwqojtzflcresgc.supabase.co/rest/v1';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2dXd3eHdxb2p0emZsY3Jlc2djIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTY5MjAsImV4cCI6MjA5NTczMjkyMH0.poGGkUPTapGlT16WebWyjXFXsBiC3IjtLDyDdfkFFaA';
const H    = { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' };

/* ── helper REST ─────────────────────────────────────────────── */
const sbFetch = async (url, opts={}) => {
  const r = await fetch(url, { ...opts, headers: {...H, ...(opts.headers||{})} });
  if (!r.ok) { const t = await r.text(); throw new Error(`Supabase: ${r.status} – ${t}`); }
  const ct = r.headers.get('content-type')||'';
  return ct.includes('json') && r.status !== 204 ? r.json() : null;
};
const sbGet = (q)     => sbFetch(`${SB}/${q}`);
const sbPost = (t,b)  => sbFetch(`${SB}/${t}`, {
  method:'POST', headers:{'Prefer':'return=representation'}, body:JSON.stringify(b)
}).then(r=>Array.isArray(r)?r[0]:r);
const sbPatch = (t,f,b) => sbFetch(`${SB}/${t}?${f}`, {
  method:'PATCH', headers:{'Prefer':'return=representation'}, body:JSON.stringify(b)
}).then(r=>Array.isArray(r)?r:r);
const sbDel  = (t,f)  => sbFetch(`${SB}/${t}?${f}`, {method:'DELETE'});
const sbUpsert = (t,b,oc) => sbFetch(`${SB}/${t}?on_conflict=${oc}`, {
  method:'POST',
  headers:{'Prefer':'resolution=merge-duplicates,return=representation'},
  body:JSON.stringify(Array.isArray(b)?b:[b])
}).then(r=>Array.isArray(r)?r[0]:r);


/* ================================================================
   SCONTRINO SCANNER — analisi AI della foto
   ================================================================ */
const FN_URL = 'https://fvuwwxwqojtzflcresgc.supabase.co/functions/v1/analyze-receipt';

function ScontrinoScanner({data, onClose, onDone}) {
  const [phase,setPhase]=useState('select');
  const [imgSrc,setImgSrc]=useState(null);
  const [imgB64,setImgB64]=useState(null);
  const [mtype,setMtype]=useState('image/jpeg');
  const [items,setItems]=useState([]);
  const [errMsg,setErrMsg]=useState('');
  const [smId,setSmId]=useState(()=>data.supermercati[0]?.id||null);
  const fileRef=useRef(null);

  const matchProdotto=nome=>{
    const q=nome.toLowerCase().trim();
    return data.prodotti.find(p=>
      p.nome.toLowerCase()===q||
      p.nome.toLowerCase().includes(q)||
      q.includes(p.nome.toLowerCase().split(' ')[0])
    )||null;
  };

  const onFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const url=URL.createObjectURL(f);
    setImgSrc(url);setPhase('preview');e.target.value='';
    // Converti in JPEG via Canvas (gestisce HEIC iPhone, ridimensiona, comprime)
    const img=new Image();
    img.onload=()=>{
      const MAX=1600;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){
        if(w>h){h=Math.round(h*MAX/w);w=MAX;}
        else{w=Math.round(w*MAX/h);h=MAX;}
      }
      const cv=document.createElement('canvas');
      cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      const b64=cv.toDataURL('image/jpeg',0.85).split(',')[1];
      setImgB64(b64);
      setMtype('image/jpeg');
    };
    img.onerror=()=>{
      // Fallback: leggi direttamente il file
      const r=new FileReader();
      r.onload=()=>{setImgB64(r.result.split(',')[1]);setMtype('image/jpeg');};
      r.readAsDataURL(f);
    };
    img.src=url;
  };

  // Fuzzy match: somiglianza nome per dedup cross-inventario
  const fuzzyNome=(a,b)=>{
    const na=a.toLowerCase().trim(), nb=b.toLowerCase().trim();
    if(na===nb)return true;
    const wa=na.split(/\s+/), wb=nb.split(/\s+/);
    const common=wa.filter(w=>w.length>3&&wb.some(v=>v.startsWith(w)||w.startsWith(v)));
    return common.length>=Math.min(wa.length,wb.length,2);
  };

  const analyze=async()=>{
    setPhase('analyzing');
    try{
      const resp=await fetch(FN_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({imageData:imgB64,mediaType:mtype,categorie:data.categorie.map(c=>c.nome)})
      });
      const json=await resp.json();
      if(!resp.ok||json.error)throw new Error(json.error||`HTTP ${resp.status}`);

      // ── STEP 1: dedup interno lista Claude (stesso nome → somma qta) ──
      const seenNomi=new Map();
      const prodottiDedup=[];
      for(const p of (json.products||[])){
        const key=p.nome.toLowerCase().trim().replace(/\s+/g,' ');
        if(seenNomi.has(key)){
          const idx=seenNomi.get(key);
          prodottiDedup[idx].qta=(parseFloat(prodottiDedup[idx].qta)||1)+(parseFloat(p.qta)||1);
        }else{
          seenNomi.set(key,prodottiDedup.length);
          prodottiDedup.push({...p});
        }
      }

      // ── STEP 2: enrich + match inventario esistente (fuzzy) ──
      const enriched=prodottiDedup.map((p,i)=>{
        const match=data.prodotti.find(inv=>fuzzyNome(inv.nome,p.nome));
        return{...p,i,
          cat_id:match?.cat_id||data.categorie.find(c=>c.nome===p.cat_nome)?.id||data.categorie.find(c=>c.nome==='Dispensa')?.id||data.categorie[0]?.id,
          selected:true,match};
      });

      setItems(enriched);
      setPhase(enriched.length>0?'confirm':'error');
      if(enriched.length===0)setErrMsg('Nessun prodotto rilevato. Prova con una foto più nitida.');
    }catch(err){setErrMsg(err.message||'Errore');setPhase('error');}
  };

  const upd=(i,field,val)=>setItems(prev=>prev.map((p,j)=>j===i?{...p,[field]:val}:p));

  const save=async()=>{
    setPhase('analyzing');
    for(const p of items.filter(p=>p.selected)){
      const prezzo=parseFloat(String(p.prezzo).replace(',','.'))||0;
      let prodId;
      if(p.match){
        prodId=p.match.id;
        if(prezzo>0)await sbPatch('prodotti',`id=eq.${prodId}`,{prezzo});
      }else{
        const saved=await db.upsertProdotto({nome:p.nome,cat_id:p.cat_id,prezzo,qta:parseFloat(p.qta)||1,unita:p.unita||'pz',sm_id:smId||null});
        prodId=saved?.id;
      }
      if(smId&&prodId&&prezzo>0)await db.upsertPrezzo(prodId,smId,prezzo);
    }
    onDone();
  };

  if(phase==='select')return(
    <div className="overlay">
      <div className="backrow"><button className="backbtn" onClick={onClose}><ILeft/></button>
        <span style={{fontSize:19,fontWeight:700}}>Scontrino</span></div>
      <div className="scan-phase">
        <div style={{fontSize:64,lineHeight:1}}>🧾</div>
        <div className="scan-h">Fotografa lo scontrino</div>
        <div className="scan-sub">L'AI rileva i prodotti, aggiorna prezzi e inventario dopo la tua conferma</div>
        <button className="btnG" style={{width:'100%',marginTop:8}} onClick={()=>fileRef.current.click()}>
          <ICam s={20}c="#fff"/> Apri fotocamera / Libreria
        </button>
        <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={onFile}/>
      </div>
    </div>
  );

  if(phase==='preview')return(
    <div className="overlay">
      <div className="backrow"><button className="backbtn" onClick={()=>setPhase('select')}><ILeft/></button>
        <span style={{fontSize:19,fontWeight:700}}>Anteprima</span></div>
      <div className="scroll" style={{paddingTop:16}}>
        <img src={imgSrc} alt="scontrino" className="scan-img"/>
        <button className="btnG" onClick={analyze}><ISrc s={18}c="#fff"/> Analizza scontrino</button>
        <button className="btnT" onClick={()=>{setPhase('select');setImgSrc(null);}}>Scegli un'altra foto</button>
      </div>
    </div>
  );

  if(phase==='analyzing')return(
    <div className="overlay" style={{alignItems:'center',justifyContent:'center'}}>
      <div className="spinner"/>
      <div style={{fontWeight:700,fontSize:18,marginTop:20}}>Analizzo lo scontrino…</div>
      <div style={{color:'#7c876d',fontSize:14,marginTop:8}}>Claude Haiku sta leggendo i prodotti</div>
    </div>
  );

  if(phase==='error')return(
    <div className="overlay">
      <div className="backrow"><button className="backbtn" onClick={onClose}><ILeft/></button>
        <span style={{fontSize:19,fontWeight:700}}>Errore</span></div>
      <div className="scan-phase">
        <div style={{fontSize:56}}>😕</div>
        <div className="scan-h">Analisi non riuscita</div>
        <div className="scan-sub">{errMsg||'Controlla ANTHROPIC_API_KEY in Supabase → Edge Functions → Secrets'}</div>
        <button className="btnG" style={{width:'100%'}} onClick={()=>setPhase('preview')}>Riprova</button>
        <button className="btnT" onClick={onClose}>Chiudi</button>
      </div>
    </div>
  );

  const nSel=items.filter(p=>p.selected).length;
  const nNew=items.filter(p=>p.selected&&!p.match).length;
  const nUpd=items.filter(p=>p.selected&&p.match).length;
  return(
    <div className="overlay">
      <div className="backrow"><button className="backbtn" onClick={()=>setPhase('preview')}><ILeft/></button>
        <span style={{fontSize:19,fontWeight:700}}>Trovati {items.length} prodotti</span></div>
      <div className="scroll" style={{paddingTop:12}}>
        <div style={{marginBottom:16}}>
          <div className="flbl">Supermercato dello scontrino</div>
          <div style={{position:'relative'}}>
            <select className="sel" style={{height:44}} value={smId||''} onChange={e=>setSmId(Number(e.target.value))}>
              <option value="">— nessuno —</option>
              {data.supermercati.map(s=><option key={s.id} value={s.id}>{s.nome}</option>)}
            </select>
            <span style={{position:'absolute',right:14,top:13,pointerEvents:'none'}}><IDown s={18}/></span>
          </div>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:14}}>
          {nNew>0&&<span className="badge-new">🆕 {nNew} nuovi</span>}
          {nUpd>0&&<span className="badge-upd">🔄 {nUpd} da aggiornare</span>}
        </div>
        {items.map((p,i)=>(
          <div className="conf-item" key={i} style={{opacity:p.selected?1:.5}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
              <input type="checkbox" className="conf-check" checked={p.selected} onChange={()=>upd(i,'selected',!p.selected)}/>
              <div style={{flex:1,minWidth:0}}>
                <input className="inp" style={{height:40,fontWeight:600}} value={p.nome} onChange={e=>upd(i,'nome',e.target.value)}/>
                {p.match&&<div style={{fontSize:11,color:'#7c876d',marginTop:3}}>🔄 Aggiorna "{p.match.nome}" · attuale {eur(p.match.prezzo)}</div>}
              </div>
              {p.match?<span className="badge-upd">AGG.</span>:<span className="badge-new">NUOVO</span>}
            </div>
            {p.selected&&(
              <div className="scan-grid">
                <div style={{flex:'1 1 130px'}}>
                  <div className="flbl">Categoria</div>
                  <select className="sel" style={{height:36}} value={p.cat_id} onChange={e=>upd(i,'cat_id',Number(e.target.value))}>
                    {data.categorie.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}
                  </select>
                </div>
                <div>
                  <div className="flbl">Qtà</div>
                  <div style={{display:'flex',alignItems:'center',gap:4,height:36}}>
                    <button className="stepb" style={{width:28,height:28}} onClick={()=>upd(i,'qta',Math.max(0.1,parseFloat(p.qta)-1))}><IMinus s={12}c="#fff"/></button>
                    <span style={{fontWeight:700,minWidth:22,textAlign:'center'}}>{p.qta}</span>
                    <button className="stepb" style={{width:28,height:28}} onClick={()=>upd(i,'qta',parseFloat(p.qta)+1)}><IPlus s={12}c="#fff"/></button>
                  </div>
                </div>
                <div>
                  <div className="flbl">Unità</div>
                  <div className="seg" style={{height:34,padding:2,gap:2,width:96}}>
                    {UNITA.map(u=><button key={u} className={'segb'+(p.unita===u?' on':'')} style={{height:30,fontSize:12}} onClick={()=>upd(i,'unita',u)}>{u}</button>)}
                  </div>
                </div>
                <div>
                  <div className="flbl">€</div>
                  <div style={{position:'relative',width:72}}>
                    <span style={{position:'absolute',left:7,top:9,color:'#7c876d',fontSize:12,fontWeight:600}}>€</span>
                    <input className="inp-sm" style={{paddingLeft:18,width:72,height:34}} value={p.prezzo} onChange={e=>upd(i,'prezzo',e.target.value)}/>
                  </div>
                </div>
              </div>
            )}
          </div>
        ))}
        <div style={{height:8}}/>
      </div>
      <div style={{flex:'none',padding:'10px 20px 14px',borderTop:'1px solid #e7ece0'}}>
        <button className="btnG" disabled={nSel===0} style={{opacity:nSel>0?1:.45}} onClick={save}>
          {nNew>0&&nUpd>0?`Aggiungi ${nNew} nuovi · aggiorna ${nUpd}`:
           nNew>0?`Aggiungi ${nNew} all'inventario`:`Aggiorna ${nUpd} prodotti`}
        </button>
      </div>
    </div>
  );
}

/* ================================================================
   LIVELLO DATI — Supabase
   ================================================================ */
const db = {
  getCategorie: ()  => sbGet('categorie?select=*&order=corsia'),
  getMembri:    ()  => sbGet('membri?select=*'),
  getSM:        ()  => sbGet('supermercati?select=*'),
  getProdotti:  ()  => sbGet('prodotti?select=*&order=nome'),
  getVoci:      ()  => sbGet('voci?select=*'),
  getPrezzi:    ()  => sbGet('prezzi?select=*'),
  getCorsie:    ()  => sbGet('corsie?select=*'),

  async upsertProdotto(p) {
    const {id,...rest}=p;
    if (id) return sbPatch('prodotti',`id=eq.${id}`,rest).then(r=>r[0]||r);
    return sbPost('prodotti', rest);
  },

  async upsertPrezzo(prod_id, sm_id, prezzo) {
    // Il trigger SQL sync_prezzo_minimo aggiorna prodotti.prezzo in automatico
    await sbUpsert('prezzi', {prod_id,sm_id,prezzo}, 'prod_id,sm_id');
  },

  async upsertCorsia(sm_id, cat_id, n) {
    await sbUpsert('corsie', {sm_id,cat_id,n}, 'sm_id,cat_id');
  },

  async addVoce(prod_id, qta, mem_id) {
    const existing = await sbGet(`voci?prod_id=eq.${prod_id}&preso=eq.false&select=*`);
    if (existing?.length > 0) {
      const v = existing[0];
      return sbPatch('voci',`id=eq.${v.id}`,{qta: v.qta + qta}).then(r=>r[0]||r);
    }
    return sbPost('voci', {prod_id, qta, preso:false, mem_id});
  },

  setPreso:        (id,preso) => sbPatch('voci',`id=eq.${id}`,{preso}),
  removeVoce:      (id)       => sbDel('voci',`id=eq.${id}`),
  addSM:           (nome)     => sbPost('supermercati',{nome}),
  removeSM:        (id)       => sbDel('supermercati',`id=eq.${id}`),
  addMembro:       (nome,ini,colore) => sbPost('membri',{nome,ini,colore}),
  removeMembro:    (id)       => sbDel('membri',`id=eq.${id}`),
  removeCategoria: (id)       => sbDel('categorie',`id=eq.${id}`),
  deleteProdotto:   (id)       => sbDel('prodotti', `id=eq.${id}`),

  async addCategoria(nome, colore) {
    const cats = await sbGet('categorie?select=corsia&order=corsia.desc&limit=1');
    const corsia = cats?.length > 0 ? cats[0].corsia + 1 : 1;
    return sbPost('categorie',{nome,colore,corsia});
  },

  async moveCategoria(id, dir) {
    const cats = await sbGet('categorie?select=*&order=corsia');
    const i = cats.findIndex(c=>c.id===id);
    const j = i + dir;
    if (j < 0 || j >= cats.length) return;
    await sbPatch('categorie',`id=eq.${cats[i].id}`,{corsia:cats[j].corsia});
    await sbPatch('categorie',`id=eq.${cats[j].id}`,{corsia:cats[i].corsia});
  },
  addMovimento:(prod_id,delta,qta_dopo,nota='')=>sbPost('movimenti',{prod_id,delta,qta_dopo,nota}),
  getMovimenti:(prod_id)=>sbGet(`movimenti?prod_id=eq.${prod_id}&order=data.desc&limit=12&select=delta,qta_dopo,data`),
  clearInventario:()=>sbDel('prodotti','id=gt.0'),
  clearVoci:()=>sbDel('voci','id=gt.0'),
  archiviaSpesa:(voci,totale,n)=>sbPost('storico_spese',{n_prodotti:n,totale_stimato:totale,voci:JSON.stringify(voci)}),
};

  return new Date(ts).toLocaleDateString('it-IT');

/* ================================================================
   SWIPE ROW — swipe sinistro per eliminare
   ================================================================ */
function SwipeRow({onDelete,children}){
  const [offset,_setOff]=useState(0);
  const [anim,setAnim]=useState(true);
  const offRef=useRef(0);
  const setOff=v=>{offRef.current=v;_setOff(v);};
  const st=useRef({sx:0,base:0,dragging:false,isH:null});
  const DEL=78;
  const contentRef=useRef(null);

  useEffect(()=>{
    const el=contentRef.current;if(!el)return;
    const ts=e=>{
      st.current={sx:e.touches[0].clientX,base:offRef.current,dragging:true,isH:null};
      setAnim(false);
    };
    const tm=e=>{
      if(!st.current.dragging)return;
      const dx=e.touches[0].clientX-st.current.sx;
      const dy=e.touches[0].clientY-st.current.sy||0;
      if(st.current.isH===null){
        if(Math.abs(dx)>7&&Math.abs(dx)>Math.abs(dy))st.current.isH=true;
        else if(Math.abs(dy)>7){st.current.isH=false;st.current.dragging=false;return;}
        else return;
      }
      if(!st.current.isH)return;
      e.preventDefault();
      setOff(Math.min(0,Math.max(st.current.base+dx,-DEL)));
    };
    const te=()=>{
      if(!st.current.dragging)return;
      st.current.dragging=false;setAnim(true);
      setOff(offRef.current<-DEL/2?-DEL:0);
    };
    el.addEventListener('touchstart',ts,{passive:true});
    el.addEventListener('touchmove',tm,{passive:false});
    el.addEventListener('touchend',te,{passive:true});
    return()=>{
      el.removeEventListener('touchstart',ts);
      el.removeEventListener('touchmove',tm);
      el.removeEventListener('touchend',te);
    };
  },[]);

  // mouse (desktop preview)
  const ms=e=>{st.current={sx:e.clientX,base:offRef.current,dragging:true,isH:true};setAnim(false);};
  const mm=e=>{if(!st.current.dragging)return;setOff(Math.min(0,Math.max(st.current.base+(e.clientX-st.current.sx),-DEL)));};
  const me=()=>{st.current.dragging=false;setAnim(true);setOff(offRef.current<-DEL/2?-DEL:0);};

  const handleClick=e=>{if(offRef.current!==0){e.stopPropagation();setAnim(true);setOff(0);}};

  return(
    <div className="swipe-wrap">
      <div className="swipe-del" onClick={e=>{e.stopPropagation();onDelete();}}>🗑</div>
      <div ref={contentRef} className="swipe-content"
        style={{transform:`translateX(${offset}px)`,transition:anim?"transform .22s ease":"none"}}
        onClick={handleClick}
        onMouseDown={ms} onMouseMove={mm} onMouseUp={me} onMouseLeave={me}>
        {children}
      </div>
    </div>
  );
}

/* ================================================================
   FILTER SHEET — bottom drawer per filtri dashboard
   ================================================================ */
function FilterSheet({open,onClose,data,filters,setFilters}){
  const [local,setLocal]=useState(filters);
  useEffect(()=>{if(open)setLocal(filters);},[open]);
  if(!open)return null;
  const apply=()=>{setFilters(local);onClose();};
  const reset=()=>{const z={sm:null,cat:null};setLocal(z);setFilters(z);onClose();};
  return(
    <>
      <div className="backdrop" onClick={onClose}/>
      <div className="sheet">
        <div className="sheet-handle"/>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div className="sheet-title">Filtri</div>
          <button onClick={reset} style={{background:"none",border:"none",cursor:"pointer",
            fontSize:13,fontWeight:700,color:"#7c876d"}}>Azzera tutti</button>
        </div>
        <div className="filter-sect">Supermercato</div>
        <div className="filter-chips">
          {[{id:null,nome:"Tutti"},...data.supermercati].map(s=>(
            <button key={s.id??'all'} className={"fchip"+(local.sm===s.id?" on":"")}
              onClick={()=>setLocal(l=>({...l,sm:s.id}))}>
              {s.nome}
            </button>
          ))}
        </div>
        <div className="filter-sect">Categoria</div>
        <div className="filter-chips">
          {[{id:null,nome:"Tutte"},...data.categorie].map(c=>(
            <button key={c.id??'all'} className={"fchip"+(local.cat===c.id?" on":"")}
              onClick={()=>setLocal(l=>({...l,cat:c.id}))}
              style={local.cat===c.id&&c.colore?{background:c.colore,borderColor:c.colore,color:"#fff"}:{}}>
              {c.nome}
            </button>
          ))}
        </div>
        <button className="btnG" onClick={apply}><IChk s={18}/> Applica filtri</button>
      </div>
    </>
  );
}


/* ================================================================
   QUICKADD — barra aggiunta rapida con ricerca dall'inventario
   ================================================================ */
function QuickAdd({data, onAddExisting, onCreateNew}) {
  const [txt,setTxt]=useState('');
  const [open,setOpen]=useState(false);

  const sugg=useMemo(()=>{
    if(!txt.trim())return[];
    const q=txt.toLowerCase();
    return(data.prodotti||[]).filter(p=>p.nome.toLowerCase().includes(q)).slice(0,6);
  },[txt,data.prodotti]);

  const exact=(data.prodotti||[]).find(p=>p.nome.toLowerCase()===txt.toLowerCase().trim());

  const addP=p=>{onAddExisting(p);setTxt('');setOpen(false);};
  const createP=()=>{if(txt.trim()){onCreateNew(txt.trim());setTxt('');setOpen(false);}};

  const handleAction=()=>{
    if(exact) addP(exact);
    else if(sugg.length===1) addP(sugg[0]);
    else if(txt.trim()) createP();
  };

  return(
    <div className="quick" style={{position:'relative'}}>
      {/* dropdown suggerimenti */}
      {open&&txt.trim()&&(
        <div className="qa-drop">
          {sugg.map(p=>{
            const c=data.categorie.find(x=>x.id==p.cat_id);
            return(
              <div key={p.id} className="qa-item"
                onMouseDown={e=>{e.preventDefault();addP(p);}}>
                <span className="dot" style={{width:34,height:34,fontSize:15,borderRadius:11,
                  background:c?.colore||'#aab39c',flex:'none'}}>
                  {p.nome[0].toUpperCase()}
                </span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:14.5}}>{p.nome}</div>
                  <div style={{fontSize:12,color:'#7c876d'}}>{c?.nome}{p.qta>0?` · ${p.qta} ${p.unita} in casa`:' · esaurito'}</div>
                </div>
                {p.soglia_minima>0&&Number(p.qta)<=Number(p.soglia_minima)&&<span className="dot-red"/>}
              </div>
            );
          })}
          {!exact&&txt.trim()&&(
            <div className="qa-item qa-new"
              onMouseDown={e=>{e.preventDefault();createP();}}>
              <span style={{width:34,height:34,borderRadius:11,background:'#4f9d2e',
                color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flex:'none',fontSize:22,fontWeight:700}}>+</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:14.5}}>Crea "{txt}"</div>
                <div style={{fontSize:12,color:'#7c876d'}}>Nuovo prodotto nell'inventario</div>
              </div>
            </div>
          )}
          {sugg.length===0&&exact===undefined&&(
            <div className="qa-item qa-new"
              onMouseDown={e=>{e.preventDefault();createP();}}>
              <span style={{width:34,height:34,borderRadius:11,background:'#4f9d2e',
                color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flex:'none',fontSize:22,fontWeight:700}}>+</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:14.5}}>Crea "{txt}"</div>
                <div style={{fontSize:12,color:'#7c876d'}}>Nuovo prodotto nell'inventario</div>
              </div>
            </div>
          )}
        </div>
      )}
      <button className="fab" onClick={handleAction}><IPlus s={24}c="#fff"/></button>
      <div className="swrap">
        <span className="sico"><ISrc s={17}/></span>
        <input className="inp" placeholder="Cerca nell'inventario…" value={txt}
          onChange={e=>{setTxt(e.target.value);setOpen(true);}}
          onKeyDown={e=>e.key==='Enter'&&handleAction()}
          onFocus={()=>setOpen(true)}
          onBlur={()=>setTimeout(()=>setOpen(false),200)}/>
      </div>
    </div>
  );
}

/* ================================================================
   SPESA SCREEN
   ================================================================ */
function SpesaScreen({data,onToggle,onRemove,onAddExisting,onCreateNew,onAzzera}){
  const [showFilter,setShowFilter]=useState(false);
  const [confirmAzzera,setConfirmAzzera]=useState(false);
  const [filters,setFilters]=useState({sm:null,cat:null});
  const {voci,prodotti,categorie,membri,supermercati,corsie}=data;

  const enrich=v=>{
    const p=prodotti.find(x=>x.id===v.prod_id)||{};
    const c=categorie.find(x=>x.id===p.cat_id);
    const m=membri.find(x=>x.id===v.mem_id);
    const sm=supermercati.find(x=>x.id===p.sm_id);
    return{...v,p,c,m,sm};
  };

  const sortKey=(v)=>{
    if(filters.sm){
      const co=corsie.find(x=>x.sm_id===filters.sm&&x.cat_id===v.p.cat_id);
      return co?co.n:v.c?.corsia??99;
    }
    return v.c?.corsia??99;
  };

  const dap=useMemo(()=>
    voci.filter(v=>!v.preso).map(enrich)
      .filter(v=>!filters.sm||v.p.sm_id===filters.sm)
      .filter(v=>!filters.cat||v.p.cat_id===filters.cat)
      .sort((a,b)=>sortKey(a)-sortKey(b))
  ,[voci,prodotti,filters,corsie]);
  const nel=useMemo(()=>voci.filter(v=>v.preso).map(enrich),[voci,prodotti]);
  const totale=nel.reduce((s,v)=>s+(v.p.prezzo||0)*v.qta,0);
  const presi=nel.length,tot=voci.length,perc=tot?(presi/tot)*100:0;
  const nFiltri=(filters.sm?1:0)+(filters.cat?1:0);
  const send=()=>{const t=txt.trim();if(!t)return;onQuickAdd(t);setTxt("");};

  return(
    <div className="body">
      <FilterSheet open={showFilter} onClose={()=>setShowFilter(false)}
        data={data} filters={filters} setFilters={setFilters}/>
      <div className="scroll">
        <div style={{paddingTop:6}}>
          <div className="lbl">{oggi().toUpperCase()}</div>
          <div className="h1">La mia spesa</div>
        </div>
        {/* progresso */}
        <div style={{display:"flex",alignItems:"center",gap:14,margin:"14px 0 6px"}}>
          <div style={{flex:1,height:8,borderRadius:8,background:"#e7ece0",overflow:"hidden"}}>
            <div style={{width:`${perc}%`,height:"100%",background:"#4f9d2e",borderRadius:8,transition:"width .4s"}}/>
          </div>
          <span style={{fontSize:13,fontWeight:700,color:"#7c876d",whiteSpace:"nowrap"}}>{presi}/{tot} presi</span>
        </div>
        {/* azzera spesa */}
        {tot>0&&(
          <div style={{display:'flex',justifyContent:'flex-end',marginTop:4,marginBottom:2}}>
            <button onClick={()=>setConfirmAzzera(true)}
              style={{background:'none',border:'1px solid #dc262660',borderRadius:10,
                padding:'4px 11px',fontSize:12,fontWeight:700,color:'#dc2626',cursor:'pointer'}}>
              ✓ Azzera spesa
            </button>
          </div>
        )}
        {/* membri */}
        <div style={{display:"flex",gap:14,margin:"12px 0 4px"}}>
          {membri.map(m=>(
            <div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <span className="av" style={{width:38,height:38,fontSize:15,background:m.colore}}>{m.ini}</span>
              <span style={{fontSize:11,fontWeight:600,color:"#7c876d"}}>{m.nome}</span>
            </div>
          ))}
        </div>
        {/* filtro bar */}
        <div style={{display:"flex",alignItems:"center",gap:8,margin:"12px 0 4px"}}>
          <button className={"pill"+(nFiltri>0?" on":"")} onClick={()=>setShowFilter(true)}
            style={{position:"relative"}}>
            <IFil s={15}/> {nFiltri>0?`Filtri (${nFiltri})`:"Filtra"}
            {nFiltri>0&&<span className="filter-badge">{nFiltri}</span>}
          </button>
          {/* active filter chips */}
          {filters.sm&&(()=>{const s=supermercati.find(x=>x.id===filters.sm);return s?(
            <span className="fact" onClick={()=>setFilters(f=>({...f,sm:null}))}>
              🏪 {s.nome} ×
            </span>):null;})()}
          {filters.cat&&(()=>{const c=categorie.find(x=>x.id===filters.cat);return c?(
            <span className="fact" style={{background:c.colore+"22",color:c.colore}}
              onClick={()=>setFilters(f=>({...f,cat:null}))}>
              {c.nome} ×
            </span>):null;})()}
        </div>
        {/* da prendere */}
        <div className="sh"><h2>Da prendere</h2><span className="badge">{dap.length}</span></div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {dap.map((v,i)=>(
            <div className="card row enter" key={v.id} style={{animationDelay:`${i*28}ms`}}
                onClick={()=>onToggle(v)}>
                <span className="chk"/>
                <div style={{flex:1,minWidth:0}}>
                  <div className="pname">{v.p.nome}</div>
                  <div className="pmeta">{v.c?.nome} · {v.qta} {v.p.unita}</div>
                  {v.p.prezzo>0&&<span className="chip"><ITag/>{eur(v.p.prezzo)}{v.sm?` · ${v.sm.nome}`:""}</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span className="av" style={{width:28,height:28,fontSize:12,background:v.m?.colore||"#aab39c"}}>
                    {v.m?.ini||"?"}
                  </span>
                  <button className="del-btn" onClick={e=>{e.stopPropagation();onRemove(v);}}>
                    <ITrash s={14}/>
                  </button>
                </div>
              </div>
          ))}
          {dap.length===0&&(
            <div className="empty">
              {nFiltri>0?"Nessun prodotto con questi filtri":"Tutto preso! 🎉"}
            </div>
          )}
        </div>
        {/* nel carrello */}
        {nel.length>0&&(
          <div className="card" style={{background:"#eef6e7",borderColor:"#dcebcf",marginTop:18,padding:4}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px 8px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <ICart s={18}c="#3a7a1f"/>
                <span style={{fontWeight:700,fontSize:16,color:"#3a7a1f"}}>Nel carrello</span>
                <span className="badge" style={{background:"#4f9d2e",color:"#fff"}}>{nel.length}</span>
              </div>
              <span style={{fontWeight:700,fontSize:16,color:"#3a7a1f"}}>{eur(totale)}</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6,padding:"0 6px 6px"}}>
              {nel.map(v=>(
                <div key={v.id} className="row" style={{padding:"9px 8px"}} onClick={()=>onToggle(v)}>
                  <span className="chk on"><IChk/></span>
                  <div style={{flex:1,minWidth:0}}>
                    <div className="pname" style={{fontSize:14.5,textDecoration:"line-through",color:"#7c876d"}}>{v.p.nome}</div>
                    <div className="pmeta">{v.c?.nome} · {v.qta} {v.p.unita}</div>
                  </div>
                  <span className="av" style={{width:24,height:24,fontSize:10,background:v.m?.colore||"#aab39c"}}>{v.m?.ini||"?"}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        <div style={{height:6}}/>
      </div>
      <QuickAdd data={data} onAddExisting={onAddExisting} onCreateNew={onCreateNew}/>
      {confirmAzzera&&(
        <div className="modal-bg" onClick={()=>setConfirmAzzera(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Azzera la spesa?</div>
            <div className="modal-body">La lista verrà salvata nello storico e poi svuotata. Questa azione non si può annullare.</div>
            <button className="btn-red" onClick={()=>{setConfirmAzzera(false);onAzzera&&onAzzera();}}>Sì, azzera la spesa</button>
            <button className="btnT" onClick={()=>setConfirmAzzera(false)}>Annulla</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ================================================================
   MODIFICA PRODOTTO

function ModificaScreen({prodotto,data,onDone,onClose}){
  const isNew=!prodotto?.id;
  const [nome,setNome]=useState(prodotto?.nome||"");
  const [catId,setCatId]=useState(prodotto?.cat_id||data.categorie[0]?.id);
  const [prezzo,setPrezzo]=useState(prodotto?.prezzo??"");
  const [qta,setQta]=useState(prodotto?.qta??1);
  const [unita,setUnita]=useState(prodotto?.unita||"pz");
  const [memId,setMemId]=useState(data.membri[0]?.id);
  const [soglia,setSoglia]=useState(prodotto?.soglia_minima??'');
  const [smId,setSmId]=useState(prodotto?.sm_id||null);
  // prezzi per supermercato
  const [prezziSM,setPrezziSM]=useState({});
  useEffect(()=>{
    if(prodotto?.id){
      db.getPrezzi().then(ps=>{
        const m={};
        ps.filter(p=>p.prod_id===prodotto.id).forEach(p=>{m[p.sm_id]=p.prezzo;});
        setPrezziSM(m);
      });
    }
  },[prodotto?.id]);
  const ok=nome.trim().length>0;
  const build=()=>({id:prodotto?.id,nome:nome.trim(),cat_id:catId,
    prezzo:parseFloat(String(prezzo).replace(",","."))||0,
    qta:Number(qta),unita,sm_id:smId||null,
    soglia_minima:parseFloat(String(soglia).replace(",","."))||0});
  const savePrezzi=async(pid)=>{
    for(const[sid,val]of Object.entries(prezziSM)){
      const n=parseFloat(String(val).replace(",","."));
      if(n>0)await db.upsertPrezzo(pid,Number(sid),n);
    }
  };
  const handleSave=async(goToList)=>{
    const saved=await db.upsertProdotto(build());
    await savePrezzi(saved.id);
    if(goToList)await db.addVoce(saved.id,Number(qta)||1,memId);
    onDone(goToList);
  };
  return(
    <div className="overlay">
      <div className="backrow">
        <button className="backbtn" onClick={onClose}><ILeft/></button>
        <span style={{fontSize:19,fontWeight:700}}>{isNew?"Nuovo prodotto":"Modifica prodotto"}</span>

      <div className="scroll" style={{paddingTop:12}}>
        <div className="flbl">Supermercato</div>
        <div style={{position:"relative",marginBottom:18}}>
          <select className="sel" value={smId||''} onChange={e=>setSmId(e.target.value?Number(e.target.value):null)}>
            <option value="">— nessuno —</option>
            {data.supermercati.map(s=><option key={s.id} value={s.id}>{s.nome}</option>)}
          </select>
          <span style={{position:"absolute",right:14,top:16,pointerEvents:"none"}}><IDown s={18}/></span>
        </div>
        <div className="flbl">Nome prodotto</div>
        <input className="inp" style={{height:52,fontSize:16,fontWeight:600}} value={nome}
          onChange={e=>setNome(e.target.value)} placeholder="Es. Latte intero" autoFocus={isNew}/>
        <div className="flbl" style={{marginTop:18}}>Categoria</div>
        <div style={{position:"relative"}}>
          <select className="sel" value={catId} onChange={e=>setCatId(Number(e.target.value))}>
            {data.categorie.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}
          </select>
          <span style={{position:"absolute",right:14,top:16,pointerEvents:"none"}}><IDown s={18}/></span>
        </div>
        <div style={{display:"flex",gap:14,marginTop:18}}>
          <div style={{flex:1}}>
            <div className="flbl">Prezzo base</div>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:12,top:15,color:"#7c876d",fontWeight:600,fontSize:14}}>€</span>
              <input className="inp" style={{height:50,fontSize:16,fontWeight:600,paddingLeft:26}}
                inputMode="decimal" value={prezzo} onChange={e=>setPrezzo(e.target.value)} placeholder="0,00"/>
            </div>
          </div>
          <div style={{flex:1}}>
            <div className="flbl">Quantità</div>

        </div>

function SMScreen({data,onChanged,onBack}){
  const [txt,setTxt]=useState("");
  // corsie state: {sm_id: {cat_id: valore}}
  const [expanded,setExpanded]=useState(null);
  const [corsieLocal,setCorsieLocal]=useState({});

  useEffect(()=>{
    // init corsie locale
    const m={};
    data.corsie.forEach(c=>{
      if(!m[c.sm_id])m[c.sm_id]={};
      m[c.sm_id][c.cat_id]=c.n;
    });
    setCorsieLocal(m);
  },[data.corsie]);

  const add=async()=>{const t=txt.trim();if(!t)return;await db.addSM(t);setTxt("");onChanged();};
  const del=async id=>{await db.removeSM(id);if(expanded===id)setExpanded(null);onChanged();};
  const saveCorsie=async(smId)=>{
    const m=corsieLocal[smId]||{};
    for(const[catId,n]of Object.entries(m)){
      const num=parseInt(n);if(!isNaN(num)&&num>0)await db.upsertCorsia(smId,Number(catId),num);
    }
    onChanged();
    setExpanded(null);
  };
  const setCorsiaVal=(smId,catId,val)=>{
    setCorsieLocal(prev=>({...prev,[smId]:{...prev[smId],[catId]:val}}));
  };
  return(
    <SubScreen title="Supermercati" onBack={onBack}>
      {data.supermercati.map(s=>(
        <div key={s.id} style={{marginBottom:9}}>
          <div className="sub-row">
            <div className="dot" style={{width:36,height:36,background:"#f5f8f0",borderRadius:12,fontSize:0}}>
              <IStore s={19}c="#7c876d"/>
            </div>
            <span className="sub-name">{s.nome}</span>
            <button className="addbtn" style={{background:"#f5f8f0"}}
              onClick={()=>setExpanded(expanded===s.id?null:s.id)}>
              {expanded===s.id?<IUp s={16}c="#7c876d"/>:<IDown s={16}c="#7c876d"/>}
            </button>
            <button className="sub-del" onClick={()=>del(s.id)}><ITrash s={15}/></button>
          </div>
          {expanded===s.id&&(
            <div style={{background:"#f9fbf7",border:"1px solid #e7ece0",borderTop:"none",
              borderRadius:"0 0 16px 16px",padding:"10px 14px 14px"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#aab39c",letterSpacing:".1em",textTransform:"uppercase",marginBottom:10}}>
                Numero corsia per categoria
              </div>
              <div className="corsia-grid">
                {data.categorie.map(cat=>(
                  <div className="corsia-row" key={cat.id}>
                    <span className="dot" style={{width:10,height:10,borderRadius:"50%",background:cat.colore,flex:"none"}}/>
                    <span className="corsia-label">{cat.nome}</span>
                    <input type="number" className="corsia-num" min="1"
                      value={corsieLocal[s.id]?.[cat.id]||""}
                      placeholder="—"
                      onChange={e=>setCorsiaVal(s.id,cat.id,e.target.value)}/>
                  </div>
                ))}
              </div>
              <button className="btnG" style={{marginTop:14,height:44,fontSize:14}}
                onClick={()=>saveCorsie(s.id)}>Salva corsie</button>
            </div>
          )}
        </div>
      ))}
      {data.supermercati.length===0&&<div className="empty">Nessun supermercato</div>}
      <div className="add-form">
        <input className="inp" placeholder="Nome supermercato…" value={txt} onChange={e=>setTxt(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&add()}/>
        <button className="fab" style={{width:46,height:46}} onClick={add}><IPlus s={22}c="#fff"/></button>
      </div>
    </SubScreen>
  );
}

  const sorted=[...data.categorie].sort((a,b)=>a.corsia-b.corsia);

function PrezziScreen({data,onChanged,onBack}){
  const [exp,setExp]=useState(null);
  const [localP,setLocalP]=useState({});// {prod_id: {sm_id: val}}
  useEffect(()=>{
    const m={};
    data.prezzi.forEach(p=>{
      if(!m[p.prod_id])m[p.prod_id]={};
      m[p.prod_id][p.sm_id]=p.prezzo;
    });
    setLocalP(m);
  },[data.prezzi]);
  const bestSM=pid=>{
    const ps=data.prezzi.filter(p=>p.prod_id===pid&&p.prezzo>0);
    if(!ps.length)return null;
    const min=ps.reduce((m,x)=>x.prezzo<m.prezzo?x:m,ps[0]);
    const sm=data.supermercati.find(x=>x.id===min.sm_id);
    return sm?`${sm.nome} ${eur(min.prezzo)}`:`${eur(min.prezzo)}`;
  };
  const saveRow=async pid=>{
    const m=localP[pid]||{};
    for(const[sid,val]of Object.entries(m)){
      const n=parseFloat(String(val).replace(",","."));
      if(!isNaN(n)&&n>0)await db.upsertPrezzo(pid,Number(sid),n);
    }
    onChanged();setExp(null);
  };
  return(
    <SubScreen title="Prezzi prodotti" onBack={onBack}>
      <div style={{fontSize:12,color:"#aab39c",fontWeight:500,marginBottom:14}}>
        Inserisci i prezzi per supermercato. Il prezzo minore viene mostrato in lista.
      </div>
      {data.prodotti.map(p=>{
        const c=data.categorie.find(x=>x.id===p.cat_id);
        const best=bestSM(p.id);
        return(
          <div className="prezzo-row" key={p.id}>
            <div className="prezzo-head" onClick={()=>setExp(exp===p.id?null:p.id)}>
              <span className="dot" style={{width:34,height:34,background:c?.colore||"#aab39c",fontSize:15,borderRadius:11}}>
                {p.nome[0]}
              </span>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:14}}>{p.nome}</div>
                {best&&<div style={{fontSize:12,color:"#4f9d2e",fontWeight:600}}>migliore: {best}</div>}
              </div>
              {exp===p.id?<IUp s={18}c="#7c876d"/>:<IDown s={18}c="#7c876d"/>}
            </div>
            {exp===p.id&&(
              <div className="prezzo-body">
                {data.supermercati.map(s=>(
                  <div className="prezzo-sm" key={s.id}>
                    <span className="prezzo-sm-name">{s.nome}</span>
                    <div className="prezzo-input-wrap">
                      <span>€</span>
                      <input className="inp-sm" inputMode="decimal" placeholder="—"
                        value={localP[p.id]?.[s.id]||""}
                        onChange={e=>setLocalP(prev=>({...prev,[p.id]:{...prev[p.id],[s.id]:e.target.value}}))}/>
                    </div>
                  </div>
                ))}
                <button className="btnG" style={{marginTop:10,height:40,fontSize:13,borderRadius:13}}
                  onClick={()=>saveRow(p.id)}>Salva prezzi</button>
              </div>
            )}
          </div>
        );
      })}
    </SubScreen>
  );
}

   APP
   ================================================================ */
function App(){
  const [screen,setScreen]=useState("spesa");
  const [editing,setEditing]=useState(null);
  const [data,setData]=useState(null);
  const [toast,setToast]=useState("");
  const timer=useRef(null);

  const showToast=msg=>{setToast(msg);clearTimeout(timer.current);timer.current=setTimeout(()=>setToast(""),2200);};

  const load=useCallback(async()=>{
    const [categorie,membri,supermercati,prodotti,voci,prezzi,corsie]=await Promise.all([
      db.getCategorie(),db.getMembri(),db.getSM(),db.getProdotti(),db.getVoci(),db.getPrezzi(),db.getCorsie(),
    ]);
    setData({categorie,membri,supermercati,prodotti,voci,prezzi,corsie});
  },[]);

  useEffect(()=>{
    load();
    const id=setInterval(load,30000); // auto-refresh ogni 30s
    return ()=>clearInterval(id);
  },[]);

  if(!data)return(
    <div className="app" style={{alignItems:"center",justifyContent:"center"}}>
      <span style={{color:"#7c876d",fontWeight:600}}>Carico…</span>
    </div>
  );

  const me=data.membri[0];

  const onToggle=async v=>{await db.setPreso(v.id,!v.preso);await load();};
  const onDeleteProdotto=async p=>{
    if(!p||p.id===undefined||p.id===null){showToast('Errore: id prodotto mancante');return;}
    showToast(`Elimino "${p.nome}"…`);
    try{await db.deleteProdotto(p.id);await load();showToast(`"${p.nome}" eliminato ✓`);}
    catch(e){showToast('Errore: '+e.message);}
  };
  const onAzzera=async()=>{
    try{
      const snapshot=data.voci.map(v=>{
        const p=data.prodotti.find(x=>x.id==v.prod_id)||{};
        return{nome:p.nome,qta:v.qta,unita:p.unita,prezzo:p.prezzo||0,preso:v.preso};
      });
      const totale=data.voci.filter(v=>v.preso).reduce((s,v)=>{
        const p=data.prodotti.find(x=>x.id==v.prod_id)||{};
        return s+(p.prezzo||0)*v.qta;
      },0);
      await db.archiviaSpesa(snapshot,totale,data.voci.length);
      await db.clearVoci();
      await load();
      showToast('Spesa completata e salvata ✓');
    }catch(e){showToast('Errore: '+e.message);}
  };
  const onClearAll=async()=>{
    try{await db.clearInventario();await load();showToast('Inventario svuotato');}
    catch(e){showToast('Errore: '+e.message);}
  };
  const onRemove=async v=>{
    try{await db.removeVoce(v.id);await load();}
    catch(e){showToast('Errore: '+e.message);}
  };
  const onAdd=async p=>{
    await db.addVoce(p.id,1,me.id);
    showToast(`"${p.nome}" aggiunto ✓`);
    await load();
  };
  const onCreateNew=nome=>{
    setEditing({nome,qta:0,unita:"pz",prezzo:0,
      cat_id:data.categorie[0]?.id,sm_id:null,soglia_minima:0});
  };
  const onModificaDone=async goToList=>{
    showToast(goToList?"Aggiunto alla spesa ✓":"Salvato nell'inventario ✓");
    setEditing(null);if(goToList)setScreen("spesa");await load();
  };

  return(
    <div className="app">
      <div className="safe-top"/>
      {screen==="spesa"&&<SpesaScreen data={data} onToggle={onToggle} onRemove={onRemove} onAddExisting={onAdd} onCreateNew={onCreateNew} onAzzera={onAzzera}/>}
      {screen==="inventario"&&<InventarioScreen data={data} onAdd={onAdd} onEdit={p=>setEditing(p)} onNew={()=>setEditing("new")} onDelete={onDeleteProdotto} onScannerDone={load} onClearAll={onClearAll}/>}
      {screen==="impostazioni"&&<SettingsScreen data={data} onChanged={load}/>}
      <TabBar screen={screen} set={setScreen}/>
      {editing&&(
        <ModificaScreen
          prodotto={editing==="new"?null:editing}
          data={data}
          onDone={onModificaDone}
          onClose={()=>setEditing(null)}
        />
      )}
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
